services:
  api:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src          # hot-reload Python changes
      - finance-db:/root/.finance
    environment:
      FINANCE_DEBUG: "true"
      FINANCE_PORT: "8000"
      FINANCE_DB_URL: ""        # override for PostgreSQL: postgresql://user:pass@db:5432/finance
      CORS_ORIGINS: "http://localhost:5173,http://localhost:80"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src         # hot-reload React changes
      - ./frontend/public:/app/public
    environment:
      VITE_API_TARGET: "http://api:8000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  finance-db:
