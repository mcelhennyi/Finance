services:
  web:
    build:
      context: .
      target: prod         # gunicorn, no reloader, no debugger
    ports:
      - "${FINANCE_PORT:-5000}:5000"
    volumes:
      - finance-db:/root/.finance
    environment:
      FINANCE_DEBUG: "false"
      FINANCE_PORT: "5000"
      FINANCE_DB_URL: ""   # set to postgresql://... for Postgres
    restart: always

volumes:
  finance-db:
